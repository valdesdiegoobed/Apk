name: Compilar APK DV Control PR

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Validar proyecto
        run: |
          test -f settings.gradle
          test -f build.gradle
          test -f app/build.gradle
          test -f app/src/main/AndroidManifest.xml
          test -f app/src/main/assets/index.html

      - name: Compilar APK debug
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Renombrar APK
        run: cp app/build/outputs/apk/debug/app-debug.apk DV-Control-de-Tramites-v1.9.0.apk

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: DV-Control-de-Tramites-v1.9.0
          path: DV-Control-de-Tramites-v1.9.0.apk
          if-no-files-found: error
          retention-days: 30
