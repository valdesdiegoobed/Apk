name: Compilar Nuevo Proyecto Android

on:
  push:
    branches: [ nuevo-proyecto-android ]
  workflow_dispatch:

permissions:
  contents: read

env:
  APK_NAME: Nuevo-Proyecto-Android.apk

jobs:
  build:
    name: Generar APK instalable
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compilar APK debug
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Preparar APK
        run: cp app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"

      - name: Publicar APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Nuevo-Proyecto-Android
          path: Nuevo-Proyecto-Android.apk
          if-no-files-found: error
          retention-days: 30
