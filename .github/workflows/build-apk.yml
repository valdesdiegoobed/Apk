name: Compilar APK DV Control estable

on:
  push:
    branches: [ main, release/v184-final-clean ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  APK_NAME: DV-Control-de-Tramites-v1.8.4-Errores-AFORE.apk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restaurar base exacta v1.8.3 con módulo independiente
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/valdesdiegoobed/Apk/release/v184-final-verified/stable-v183-assets.b64" -o /tmp/stable-v183-assets.b64
          base64 --decode /tmp/stable-v183-assets.b64 > /tmp/stable-assets.zip
          unzip -t /tmp/stable-assets.zip >/dev/null
          rm -rf app/src/main/assets
          mkdir -p app/src/main/assets
          unzip -q /tmp/stable-assets.zip -d /tmp/stable-assets
          cp -a /tmp/stable-assets/assets/. app/src/main/assets/
          test -f app/src/main/assets/index.html
          test -f app/src/main/assets/dv-v183.js
          test -f app/src/main/assets/afore-errors-v1-8-4.js
          grep -q 'afore-errors-v1-8-4.js' app/src/main/assets/index.html
          grep -q '⚠️ Errores AFORE' app/src/main/assets/afore-errors-v1-8-4.js
          grep -q 'Registrar error AFORE' app/src/main/assets/afore-errors-v1-8-4.js
          grep -q 'Conclusión personal del asesor' app/src/main/assets/afore-errors-v1-8-4.js
          grep -q 'MC G04' app/src/main/assets/afore-errors-v1-8-4.js
          grep -q '#dvMenuPanel .dv-menu-grid' app/src/main/assets/afore-errors-v1-8-4.js

      - name: Compilar APK instalable
        run: gradle clean assembleDebug --no-daemon --stacktrace

      - name: Verificar firma, paquete, versión, menú y catálogo
        shell: bash
        run: |
          set -euo pipefail
          APK=app/build/outputs/apk/debug/app-debug.apk
          test -s "$APK"
          unzip -t "$APK" >/dev/null
          apksigner verify --verbose --print-certs "$APK" | tee /tmp/apksigner.txt
          grep -q 'Verified using v2 scheme.*true' /tmp/apksigner.txt
          aapt dump badging "$APK" | tee /tmp/badging.txt
          grep -q "package: name='com.diegovaldes.dvcontroltramites.afore'" /tmp/badging.txt
          grep -q "versionName='1.8.4'" /tmp/badging.txt
          unzip -p "$APK" assets/index.html | grep -q 'afore-errors-v1-8-4.js'
          unzip -p "$APK" assets/afore-errors-v1-8-4.js | grep -q '⚠️ Errores AFORE'
          unzip -p "$APK" assets/afore-errors-v1-8-4.js | grep -q 'Registrar error AFORE'
          unzip -p "$APK" assets/afore-errors-v1-8-4.js | grep -q 'MC G04'
          cp "$APK" "$APK_NAME"
          sha256sum "$APK_NAME" | tee SHA256SUMS.txt

      - name: Publicar APK comprobada
        uses: actions/upload-artifact@v4
        with:
          name: DV-Control-de-Tramites-v1.8.4-Errores-AFORE-INSTALABLE
          path: |
            DV-Control-de-Tramites-v1.8.4-Errores-AFORE.apk
            SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
