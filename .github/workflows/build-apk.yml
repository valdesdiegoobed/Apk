name: Compilar APK DV Control

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  APK_NAME: DV-Control-de-Tramites-v1.9.0.apk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compilar APK debug
        run: gradle assembleDebug --no-daemon

      - name: Preparar APK
        run: cp app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"

      - name: Publicar APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: DV-Control-de-Tramites-v1.9.0
          path: DV-Control-de-Tramites-v1.9.0.apk
          if-no-files-found: error
          retention-days: 30

