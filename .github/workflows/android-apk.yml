name: Compilar APK Android

on:
  push:
    branches: [main, android-v0.1]
    paths:
      - 'android/**'
      - '.github/workflows/android-apk.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Configurar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Compilar APK de prueba
        shell: bash
        run: |
          set +e
          gradle assembleDebug --stacktrace > build-output.log 2>&1
          code=$?
          tail -n 220 build-output.log
          exit $code
      - name: Publicar registro de compilación
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Registro-compilacion-Android
          path: android/build-output.log
          if-no-files-found: ignore
      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: Expediente-Clientes-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
