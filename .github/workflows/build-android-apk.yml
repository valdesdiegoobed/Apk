name: Compilar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-apk:
    name: Generar APK instalable
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Compilar aplicación web
        run: npm run build

      - name: Crear proyecto Android
        run: npx cap add android

      - name: Sincronizar aplicación con Android
        run: npx cap sync android

      - name: Dar permisos a Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK de prueba
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Preparar APK
        run: |
          mkdir -p entrega
          cp android/app/build/outputs/apk/debug/app-debug.apk "entrega/DV-Control-de-Tramites.apk"

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: DV-Control-de-Tramites-Android
          path: entrega/DV-Control-de-Tramites.apk
          if-no-files-found: error
          retention-days: 30
