name: Publicar aplicación en GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar sitio estático
        run: |
          mkdir -p public-site
          cp index.html public-site/index.html
          touch public-site/.nojekyll

      - name: Subir sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public-site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
