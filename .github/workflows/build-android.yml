name: Verificar APK Android

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compilar APK instalable
        id: build_apk
        continue-on-error: true
        run: gradle :app:assembleDebug --stacktrace > build.log 2>&1

      - name: Subir registro
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registro-v1.2.0
          path: build.log
          if-no-files-found: error
          retention-days: 7

      - name: Detener si falló
        if: steps.build_apk.outcome != 'success'
        run: |
          tail -n 160 build.log
          exit 1

      - name: Verificar y nombrar APK
        run: |
          test -s app/build/outputs/apk/debug/app-debug.apk
          mkdir -p apk-lista
          cp app/build/outputs/apk/debug/app-debug.apk apk-lista/DV-Control-de-Tramites-v1.2.0.apk
          ls -lh apk-lista/DV-Control-de-Tramites-v1.2.0.apk

      - name: Subir APK comprobada
        uses: actions/upload-artifact@v4
        with:
          name: DV-Control-de-Tramites-v1.2.0
          path: apk-lista/DV-Control-de-Tramites-v1.2.0.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 7