name: Compilar APK Android

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compilar APK instalable
        run: gradle :app:assembleDebug --stacktrace

      - name: Preparar archivo
        run: cp app/build/outputs/apk/debug/app-debug.apk DV-Control-de-Tramites-v1.0.0.apk

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: DV-Control-de-Tramites-APK
          path: DV-Control-de-Tramites-v1.0.0.apk
          retention-days: 90
