name: Compilar y publicar APK Android

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/build-android.yml'

permissions:
  contents: write

concurrency:
  group: android-apk-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compilar APK instalable
        run: gradle :app:assembleDebug --stacktrace

      - name: Preparar APK
        run: |
          mkdir -p downloads
          cp app/build/outputs/apk/debug/app-debug.apk downloads/DV-Control-de-Tramites-v1.0.0.apk
          cp app/build/outputs/apk/debug/app-debug.apk downloads/DV-Control-de-Tramites-ultima.apk
          test -s downloads/DV-Control-de-Tramites-v1.0.0.apk

      - name: Publicar artefacto APK
        uses: actions/upload-artifact@v4
        with:
          name: DV-Control-de-Tramites-APK
          path: downloads/DV-Control-de-Tramites-v1.0.0.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 90

      - name: Publicar descarga directa en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f downloads/DV-Control-de-Tramites-v1.0.0.apk downloads/DV-Control-de-Tramites-ultima.apk
          if git diff --cached --quiet; then
            echo "La APK publicada ya está actualizada."
          else
            git commit -m "Publicar APK Android v1.0.0 [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
