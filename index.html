<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Expedientes" />
  <link rel="manifest" href="/Apk/manifest.webmanifest" />
  <link rel="icon" href="/Apk/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/Apk/icon.svg" />
  <title>Control de Expedientes</title>
  <style>
    :root{font-family:Arial,sans-serif;color:#172033;background:#f4f6f8}*{box-sizing:border-box}body{margin:0}.bar{background:#0f172a;color:white;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:10px}.wrap{max-width:950px;margin:auto;padding:18px}.card{background:white;border-radius:14px;padding:18px;box-shadow:0 3px 16px #0002;margin-bottom:16px}.login{max-width:430px;margin:10vh auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}input,select,textarea,button{font:inherit;width:100%;padding:12px;border-radius:9px;border:1px solid #c8ced8;margin-top:7px}button{background:#155eef;color:white;border:0;font-weight:700;cursor:pointer}.secondary{background:#fff;color:#172033;border:1px solid #aeb7c6}.danger{background:#b42318}.success{background:#027a48}.hidden{display:none!important}.error{background:#fee4e2;color:#912018;padding:11px;border-radius:9px;margin:10px 0}.ok{background:#dcfae6;color:#05603a;padding:11px;border-radius:9px;margin:10px 0}.item{border:1px solid #d8dde5;border-radius:12px;padding:14px;margin-top:10px}.row{display:flex;gap:10px;align-items:center}.row>*{flex:1}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions button{width:auto;min-width:90px}.small{font-size:.88rem;color:#667085}.title{font-size:1.35rem;font-weight:800}.subtitle{font-size:1rem;font-weight:700;margin-top:8px}.spinner{width:42px;height:42px;border:5px solid #ddd;border-top-color:#155eef;border-radius:50%;animation:s 1s linear infinite;margin:25vh auto}@keyframes s{to{transform:rotate(360deg)}}@media(max-width:650px){.row{align-items:flex-start;flex-direction:column}.actions{width:100%}.actions button{flex:1}.bar{align-items:flex-start}}
  </style>
</head>
<body>
  <div id="loading" class="spinner"></div>
  <section id="login" class="wrap login hidden">
    <div class="card">
      <div class="title">Acceso privado</div>
      <p class="small">Ingresa con tu correo y contraseña autorizados.</p>
      <div id="loginError" class="error hidden"></div>
      <input id="email" type="email" placeholder="Correo electrónico" autocomplete="email" />
      <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password" />
      <button id="loginBtn">Iniciar sesión</button>
    </div>
  </section>
  <section id="app" class="hidden">
    <header class="bar"><div><strong>Control de Expedientes</strong><div id="userEmail" class="small" style="color:#cbd5e1"></div></div><button id="logoutBtn" class="secondary" style="width:auto;margin:0">Cerrar sesión</button></header>
    <main class="wrap">
      <div class="card">
        <div id="formTitle" class="title">Nuevo expediente</div>
        <p class="small">Los datos se guardan en tu cuenta privada de Firebase.</p>
        <div class="grid">
          <input id="nombre" placeholder="Nombre completo" />
          <input id="curp" placeholder="CURP" maxlength="18" />
          <input id="rfc" placeholder="RFC" maxlength="13" />
          <input id="telefono" placeholder="Teléfono" inputmode="tel" />
          <input id="fechaNacimiento" type="date" title="Fecha de nacimiento" />
          <input id="fechaInicio" type="date" title="Fecha de inicio" />
          <input id="fechaSolicitud" type="date" title="Fecha para crear solicitud" />
          <input id="fechaCulminacion" type="date" title="Fecha de culminación" />
          <select id="estado"><option>Activo</option><option>En revisión</option><option>Solicitud realizada</option><option>Terminado</option><option>Archivado</option></select>
        </div>
        <textarea id="notas" placeholder="Notas del expediente" rows="3"></textarea>
        <div class="actions">
          <button id="saveBtn">Guardar expediente</button>
          <button id="cancelBtn" class="secondary hidden">Cancelar edición</button>
        </div>
        <div id="saveError" class="error hidden"></div>
        <div id="saveOk" class="ok hidden"></div>
      </div>
      <div class="card">
        <div class="title">Expedientes guardados</div>
        <input id="search" placeholder="Buscar por nombre, CURP, RFC o teléfono" />
        <div id="list"><p class="small">Cargando…</p></div>
      </div>
    </main>
  </section>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js';
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js';

  const firebaseConfig={apiKey:'AIzaSyA_pvV6d-sr7OpeBdRuf1w5uhmXTa6EE9c',authDomain:'control-expedientes-privados.firebaseapp.com',projectId:'control-expedientes-privados',storageBucket:'control-expedientes-privados.firebasestorage.app',messagingSenderId:'939272933933',appId:'1:939272933933:web:c53508c545367c05f71ea4'};
  const fb=initializeApp(firebaseConfig),auth=getAuth(fb),db=getFirestore(fb);
  const $=id=>document.getElementById(id); let registros=[],unsubscribe=null,editandoId=null;
  const show=(id,yes)=>$(id).classList.toggle('hidden',!yes);
  const text=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const campos=['nombre','curp','rfc','telefono','fechaNacimiento','fechaInicio','fechaSolicitud','fechaCulminacion','notas'];

  if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/Apk/sw.js').catch(()=>{}));}

  $('loginBtn').onclick=async()=>{show('loginError',false);try{await signInWithEmailAndPassword(auth,$('email').value.trim(),$('password').value)}catch(e){$('loginError').textContent=e.code==='auth/unauthorized-domain'?'Falta autorizar este dominio en Firebase Authentication.':'No fue posible iniciar sesión. Revisa el correo y la contraseña.';show('loginError',true)}};
  $('logoutBtn').onclick=()=>signOut(auth);
  $('password').onkeydown=e=>{if(e.key==='Enter')$('loginBtn').click()};

  onAuthStateChanged(auth,user=>{
    show('loading',false);show('login',!user);show('app',!!user);$('userEmail').textContent=user?.email||'';
    if(unsubscribe){unsubscribe();unsubscribe=null}
    if(user){const ref=collection(db,'usuarios',user.uid,'expedientes');unsubscribe=onSnapshot(query(ref,orderBy('creado','desc')),snap=>{registros=snap.docs.map(d=>({id:d.id,...d.data()}));render()},()=>{$('list').innerHTML='<div class="error">No fue posible leer Firestore. Revisa las reglas de seguridad.</div>'})}
  });

  function datosFormulario(){return{nombre:$('nombre').value.trim(),curp:$('curp').value.trim().toUpperCase(),rfc:$('rfc').value.trim().toUpperCase(),telefono:$('telefono').value.trim(),fechaNacimiento:$('fechaNacimiento').value,fechaInicio:$('fechaInicio').value,fechaSolicitud:$('fechaSolicitud').value,fechaCulminacion:$('fechaCulminacion').value,estado:$('estado').value,notas:$('notas').value.trim(),actualizado:serverTimestamp()}}
  function limpiar(){campos.forEach(x=>$(x).value='');$('estado').value='Activo';editandoId=null;$('formTitle').textContent='Nuevo expediente';$('saveBtn').textContent='Guardar expediente';show('cancelBtn',false)}

  $('saveBtn').onclick=async()=>{
    show('saveError',false);show('saveOk',false);const data=datosFormulario();if(!data.nombre){$('saveError').textContent='Escribe el nombre completo.';show('saveError',true);return}const u=auth.currentUser;if(!u)return;
    try{if(editandoId){await updateDoc(doc(db,'usuarios',u.uid,'expedientes',editandoId),data);$('saveOk').textContent='Expediente actualizado correctamente.'}else{await addDoc(collection(db,'usuarios',u.uid,'expedientes'),{...data,creado:serverTimestamp()});$('saveOk').textContent='Expediente guardado correctamente.'}show('saveOk',true);limpiar();setTimeout(()=>show('saveOk',false),3000)}catch(e){$('saveError').textContent='No se pudo guardar. Revisa tu conexión y las reglas de Firestore.';show('saveError',true)}
  };
  $('cancelBtn').onclick=limpiar;
  $('search').oninput=render;
  window.editar=id=>{const r=registros.find(x=>x.id===id);if(!r)return;editandoId=id;campos.forEach(x=>$(x).value=r[x]||'');$('estado').value=r.estado||'Activo';$('formTitle').textContent='Editar expediente';$('saveBtn').textContent='Guardar cambios';show('cancelBtn',true);window.scrollTo({top:0,behavior:'smooth'})};
  window.borrar=async id=>{if(confirm('¿Eliminar este expediente de forma permanente?'))await deleteDoc(doc(db,'usuarios',auth.currentUser.uid,'expedientes',id))};
  function render(){const q=$('search').value.toLowerCase();const xs=registros.filter(r=>[r.nombre,r.curp,r.rfc,r.telefono].some(v=>String(v||'').toLowerCase().includes(q)));$('list').innerHTML=xs.length?xs.map(r=>`<div class="item"><div class="row"><div><strong>${text(r.nombre)}</strong><div class="small">${text(r.curp||'CURP pendiente')} · ${text(r.rfc||'RFC pendiente')} · ${text(r.estado||'')}</div><div class="small">Teléfono: ${text(r.telefono||'—')}</div><div class="small">Inicio: ${text(r.fechaInicio||'—')} | Solicitud: ${text(r.fechaSolicitud||'—')} | Fin: ${text(r.fechaCulminacion||'—')}</div>${r.notas?`<div class="small">Notas: ${text(r.notas)}</div>`:''}</div><div class="actions"><button class="success" onclick="editar('${r.id}')">Editar</button><button class="danger" onclick="borrar('${r.id}')">Eliminar</button></div></div></div>`).join(''):'<p class="small">No hay expedientes guardados.</p>'}
</script>
</body>
</html>
